<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepCode-GUI</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }

      body {
        background: #f5f6f7;
        color: #202124;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .deepcode-gui-boot {
        height: 100%;
        display: grid;
        place-items: center;
        background: #f5f6f7;
      }

      .deepcode-gui-boot__card {
        min-width: min(360px, calc(100vw - 56px));
        padding: 18px 20px;
        border: 1px solid #dedbd2;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 18px 42px rgba(32, 33, 36, 0.08);
      }

      .deepcode-gui-boot__title {
        font-size: 14px;
        font-weight: 620;
      }

      .deepcode-gui-boot__body {
        margin-top: 8px;
        color: #7b7f87;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="deepcode-gui-boot">
        <div class="deepcode-gui-boot__card">
          <div class="deepcode-gui-boot__title" data-i18n-text="deepcodeGui.boot.startingTitle">DeepCode-GUI</div>
          <div class="deepcode-gui-boot__body" data-i18n-text="deepcodeGui.boot.loadingWorkbench">Loading local workbench...</div>
        </div>
      </div>
    </div>
    <script>
      const BOOT_I18N = {
        "zh-CN": {
          "deepcodeGui.boot.startingTitle": "DeepCode-GUI 正在启动",
          "deepcodeGui.boot.loadingWorkbench": "正在加载本地工作台..."
        },
        "en-US": {
          "deepcodeGui.boot.startingTitle": "DeepCode-GUI is starting",
          "deepcodeGui.boot.loadingWorkbench": "Loading local workbench..."
        }
      };

      function bootLanguage() {
        try {
          return window.localStorage.getItem("deepcode.ui.language") === "en-US" ? "en-US" : "zh-CN";
        } catch {
          return "zh-CN";
        }
      }

      const language = bootLanguage();
      document.documentElement.lang = language;
      document.querySelectorAll("[data-i18n-text]").forEach((node) => {
        const key = node.getAttribute("data-i18n-text");
        node.textContent = BOOT_I18N[language]?.[key] ?? BOOT_I18N["zh-CN"][key] ?? key;
      });
    </script>
    <script type="module" src="/src/deepcode-gui/main.tsx"></script>
  </body>
</html>
