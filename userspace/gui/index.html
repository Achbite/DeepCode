<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepCode</title>
    <script>
      if (typeof performance !== "undefined") {
        performance.mark("deepcode:native-shell");
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        background: #0a0a0c;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }
      body {
        overflow: hidden;
        background: #0a0a0c;
        color: #ededed;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .boot-shell {
        display: grid;
        grid-template-rows: 38px 1fr 22px;
        width: 100vw;
        height: 100vh;
        background: #0a0a0c;
      }
      .boot-shell__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: #18181b;
        color: #fff;
        font-size: 13px;
        font-weight: 650;
        -webkit-app-region: drag;
        app-region: drag;
      }
      .window-controls,
      .window-control {
        -webkit-app-region: no-drag;
        app-region: no-drag;
      }
      .window-controls {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        height: 100%;
      }
      .window-control {
        position: relative;
        width: 30px;
        height: 28px;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: #a1a1aa;
        cursor: pointer;
      }
      .window-control:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }
      .window-control--close:hover {
        background: #ff3b30;
        color: #fff;
      }
      .window-control::before,
      .window-control::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
      .window-control--minimize::before {
        width: 12px;
        height: 1px;
        background: currentColor;
      }
      .window-control--maximize::before {
        width: 11px;
        height: 9px;
        border: 1px solid currentColor;
      }
      .window-control--close::before,
      .window-control--close::after {
        width: 13px;
        height: 1px;
        background: currentColor;
      }
      .window-control--close::before {
        transform: translate(-50%, -50%) rotate(45deg);
      }
      .window-control--close::after {
        transform: translate(-50%, -50%) rotate(-45deg);
      }
      .boot-shell__body {
        display: grid;
        grid-template-columns: 48px 260px minmax(360px, 1fr) 380px;
        min-height: 0;
      }
      .boot-shell__rail {
        background: #18181b;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
      }
      .boot-shell__side,
      .boot-shell__agent {
        background: #131316;
      }
      .boot-shell__side {
        border-right: 1px solid rgba(255, 255, 255, 0.08);
      }
      .boot-shell__agent {
        border-left: 1px solid rgba(255, 255, 255, 0.08);
      }
      .boot-shell__center {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #a1a1aa;
        font-size: 12px;
      }
      .boot-shell__status {
        background: #0a84ff;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <div class="boot-shell__header" data-tauri-drag-region>
          <span>DeepCode</span>
          <span class="window-controls" data-i18n-aria="window.controls" aria-label="Window controls">
            <button
              id="boot-minimize"
              class="window-control window-control--minimize"
              type="button"
              data-i18n-aria="window.minimize"
              data-i18n-title="window.minimize"
              aria-label="Minimize"
              title="Minimize"
            ></button>
            <button
              id="boot-maximize"
              class="window-control window-control--maximize"
              type="button"
              data-i18n-aria="window.maximize"
              data-i18n-title="window.maximize"
              aria-label="Maximize or restore"
              title="Maximize or restore"
            ></button>
            <button
              id="boot-close"
              class="window-control window-control--close"
              type="button"
              data-i18n-aria="window.close"
              data-i18n-title="window.close"
              aria-label="Close"
              title="Close"
            ></button>
          </span>
        </div>
        <div class="boot-shell__body">
          <div class="boot-shell__rail"></div>
          <div class="boot-shell__side"></div>
          <div class="boot-shell__center" data-i18n-text="app.starting">Starting DeepCode...</div>
          <div class="boot-shell__agent"></div>
        </div>
        <div class="boot-shell__status"></div>
      </div>
    </div>
    <script>
      const BOOT_I18N = {
        "zh-CN": {
          "app.starting": "DeepCode 启动中...",
          "window.controls": "窗口控制",
          "window.minimize": "最小化",
          "window.maximize": "最大化或还原",
          "window.close": "关闭"
        },
        "en-US": {
          "app.starting": "Starting DeepCode...",
          "window.controls": "Window controls",
          "window.minimize": "Minimize",
          "window.maximize": "Maximize or restore",
          "window.close": "Close"
        }
      };

      function bootLanguage() {
        try {
          return window.localStorage.getItem("deepcode.ui.language") === "en-US" ? "en-US" : "zh-CN";
        } catch {
          return "zh-CN";
        }
      }

      function bootText(language, key) {
        return BOOT_I18N[language]?.[key] ?? BOOT_I18N["zh-CN"][key] ?? key;
      }

      function applyBootI18n() {
        const language = bootLanguage();
        document.documentElement.lang = language;
        document.querySelectorAll("[data-i18n-text]").forEach((node) => {
          node.textContent = bootText(language, node.getAttribute("data-i18n-text"));
        });
        document.querySelectorAll("[data-i18n-title]").forEach((node) => {
          node.setAttribute("title", bootText(language, node.getAttribute("data-i18n-title")));
        });
        document.querySelectorAll("[data-i18n-aria]").forEach((node) => {
          node.setAttribute("aria-label", bootText(language, node.getAttribute("data-i18n-aria")));
        });
      }

      function runBootWindowCommand(commandName, command) {
        try {
          const result = command();
          if (result && typeof result.catch === "function") {
            result.catch((err) => console.warn(`[window] ${commandName} failed.`, err));
          }
        } catch (err) {
          console.warn(`[window] ${commandName} failed.`, err);
        }
      }

      function bindBootWindowControls() {
        const invoke = window.__TAURI__?.core?.invoke;
        if (!invoke) return;
        document
          .getElementById("boot-minimize")
          ?.addEventListener("click", () =>
            runBootWindowCommand("minimize", () => invoke("deepcode_window_minimize"))
          );
        document
          .getElementById("boot-maximize")
          ?.addEventListener("click", () =>
            runBootWindowCommand("toggleMaximize", () =>
              invoke("deepcode_window_toggle_maximize")
            )
          );
        document
          .getElementById("boot-close")
          ?.addEventListener("click", () =>
            runBootWindowCommand("close", () => invoke("deepcode_window_close"))
          );
      }

      applyBootI18n();
      bindBootWindowControls();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
